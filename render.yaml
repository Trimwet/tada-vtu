# render.yaml
#
# Deploys the TADAPAY WhatsApp bot as a Render Background Worker.
# The Next.js app lives on Vercel — this only runs the Baileys process.
#
# Setup:
#   1. Connect this repo to Render.
#   2. Set the environment variables below in the Render dashboard.
#   3. Run `bun run src/scripts/seed-baileys-session.ts` locally first
#      to pre-seed your Supabase session (avoids showing QR on first deploy).
#   4. Deploy. Render will log "Session restored from Supabase — no QR needed."
#
# If you ever need to re-pair (session invalidated):
#   - Delete the 'default' row in your Supabase baileys_sessions table.
#   - Trigger a new Render deploy.
#   - Watch the logs for the QR code and scan it.

services:
  - type: web           # "web" gives us a public /health URL for UptimeRobot
    name: tadapay-whatsapp-bot
    runtime: node
    region: oregon       # Pick the region closest to your users
    plan: free

    buildCommand: bun install --frozen-lockfile
    startCommand: bun run src/scripts/whatsapp-baileys.ts

    # Health check keeps the Render free-tier container alive.
    # Pair this with UptimeRobot pinging /health every 5 minutes.
    healthCheckPath: /health

    # Auto-deploy on every push to main.
    autoDeploy: true

    # Restart ONLY on non-zero exit codes.
    # Exit 0 (loggedOut) means "session invalidated — don't restart".
    # Exit 1 means something went wrong — restart.

    envVars:
      # ── Supabase ──────────────────────────────────────────────────────────
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false       # Set in Render dashboard

      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false       # Set in Render dashboard (keep secret)

      # ── Eve / Groq ────────────────────────────────────────────────────────
      - key: GROQ_API_KEY
        sync: false

      # ── Internal API auth ─────────────────────────────────────────────────
      - key: CORE_SECRET
        sync: false

      # ── Next.js app URL (where Eve's API routes live — your Vercel URL) ──
      - key: NEXT_APP_URL
        value: https://tadavtu.com   # Update if your Vercel URL is different

      # ── Health server port (Render injects PORT automatically) ────────────
      - key: PORT
        value: "3001"
